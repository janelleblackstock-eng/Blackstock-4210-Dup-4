<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Art Nouveau Floral Bloom for Hover Effects -->
  <defs>
    <radialGradient id="petalGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a8b87a;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#8A9A5B;stop-opacity:0.2"/>
    </radialGradient>
    <radialGradient id="centerGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D4B989"/>
      <stop offset="100%" style="stop-color:#C5A572"/>
    </radialGradient>
  </defs>

  <!-- Petals - 8 ellipses rotated around center -->
  <g fill="url(#petalGradient)">
    <ellipse cx="50" cy="30" rx="8" ry="20" transform="rotate(0 50 50)"/>
    <ellipse cx="50" cy="30" rx="8" ry="20" transform="rotate(45 50 50)"/>
    <ellipse cx="50" cy="30" rx="8" ry="20" transform="rotate(90 50 50)"/>
    <ellipse cx="50" cy="30" rx="8" ry="20" transform="rotate(135 50 50)"/>
    <ellipse cx="50" cy="30" rx="8" ry="20" transform="rotate(180 50 50)"/>
    <ellipse cx="50" cy="30" rx="8" ry="20" transform="rotate(225 50 50)"/>
    <ellipse cx="50" cy="30" rx="8" ry="20" transform="rotate(270 50 50)"/>
    <ellipse cx="50" cy="30" rx="8" ry="20" transform="rotate(315 50 50)"/>
  </g>

  <!-- Inner petals - smaller -->
  <g fill="#8A9A5B" opacity="0.3">
    <ellipse cx="50" cy="38" rx="5" ry="12" transform="rotate(22.5 50 50)"/>
    <ellipse cx="50" cy="38" rx="5" ry="12" transform="rotate(67.5 50 50)"/>
    <ellipse cx="50" cy="38" rx="5" ry="12" transform="rotate(112.5 50 50)"/>
    <ellipse cx="50" cy="38" rx="5" ry="12" transform="rotate(157.5 50 50)"/>
    <ellipse cx="50" cy="38" rx="5" ry="12" transform="rotate(202.5 50 50)"/>
    <ellipse cx="50" cy="38" rx="5" ry="12" transform="rotate(247.5 50 50)"/>
    <ellipse cx="50" cy="38" rx="5" ry="12" transform="rotate(292.5 50 50)"/>
    <ellipse cx="50" cy="38" rx="5" ry="12" transform="rotate(337.5 50 50)"/>
  </g>

  <!-- Center -->
  <circle cx="50" cy="50" r="10" fill="url(#centerGradient)"/>
  <circle cx="50" cy="50" r="6" fill="#C5A572" opacity="0.5"/>
</svg>
