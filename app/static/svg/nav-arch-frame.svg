<svg viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <!-- Art Nouveau Navigation Arch Frame -->
  <defs>
    <linearGradient id="archGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C5A572;stop-opacity:0.5"/>
      <stop offset="25%" style="stop-color:#C5A572;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#D4B989;stop-opacity:1"/>
      <stop offset="75%" style="stop-color:#C5A572;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C5A572;stop-opacity:0.5"/>
    </linearGradient>

    <!-- Stained glass inspired pattern -->
    <pattern id="glassPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none"/>
      <path d="M0 10 Q5 5, 10 10 T20 10" stroke="#8A9A5B" stroke-width="0.5" fill="none" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Main arch shape -->
  <path d="M20 75 Q20 20, 200 10 Q380 20, 380 75"
        fill="none"
        stroke="url(#archGradient)"
        stroke-width="3"
        stroke-linecap="round"/>

  <!-- Inner arch -->
  <path d="M40 70 Q40 30, 200 22 Q360 30, 360 70"
        fill="none"
        stroke="#C5A572"
        stroke-width="1"
        opacity="0.5"/>

  <!-- Decorative top flourish -->
  <g transform="translate(185, 5)">
    <path d="M0 15 Q15 0, 30 15" fill="none" stroke="#C5A572" stroke-width="1.5"/>
    <circle cx="15" cy="5" r="3" fill="#C5A572"/>
    <path d="M10 12 Q15 8, 20 12" fill="none" stroke="#8A9A5B" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Corner flourishes -->
  <g transform="translate(10, 60)">
    <path d="M0 15 Q8 8, 15 0" fill="none" stroke="#C5A572" stroke-width="1.5"/>
    <circle cx="0" cy="15" r="2" fill="#C5A572"/>
  </g>

  <g transform="translate(375, 60)">
    <path d="M15 15 Q7 8, 0 0" fill="none" stroke="#C5A572" stroke-width="1.5"/>
    <circle cx="15" cy="15" r="2" fill="#C5A572"/>
  </g>
</svg>
