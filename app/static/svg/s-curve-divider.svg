<svg viewBox="0 0 1200 60" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <!-- Art Nouveau S-Curve Section Divider -->
  <defs>
    <linearGradient id="curveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C5A572;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#C5A572;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#D4B989;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#C5A572;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C5A572;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Main S-curve -->
  <path d="M0 30 Q300 0, 600 30 T1200 30"
        fill="none"
        stroke="url(#curveGradient)"
        stroke-width="2"/>

  <!-- Secondary parallel curve -->
  <path d="M0 35 Q300 5, 600 35 T1200 35"
        fill="none"
        stroke="#C5A572"
        stroke-width="1"
        opacity="0.5"/>

  <!-- Decorative center element -->
  <circle cx="600" cy="30" r="4" fill="#C5A572"/>
  <circle cx="600" cy="30" r="8" fill="none" stroke="#C5A572" stroke-width="1" opacity="0.5"/>

  <!-- Small accent dots along curve -->
  <circle cx="300" cy="15" r="2" fill="#8A9A5B" opacity="0.6"/>
  <circle cx="900" cy="15" r="2" fill="#8A9A5B" opacity="0.6"/>
</svg>
